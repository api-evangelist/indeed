specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Indeed
providerId: indeed
publisherName: Indeed, Inc.
serviceCategory: Recruiting + Job Advertising
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Careers
  - Employment
  - Hiring
  - Recruiting
  - FinOps
  - FOCUS
description: FOCUS-aligned FinOps shape for Indeed. The dominant cost line is sponsored-job advertising
  spend (cost-per-click or pay-per-applicant) consumed through the auction; API access for partners is
  bundled into partner agreements rather than separately metered. FinOps practice for Indeed therefore
  focuses on advertising-spend governance, not API-call accounting.
notes: API itself is not separately billed; the FinOps focus is the advertising auction (CPC/PPA) and
  the per-applicant economics it produces.
sources:
  - https://www.indeed.com/hire/how-indeed-works
  - https://partners.indeed.com/
principles:
  - name: Visibility
    description: Use the Indeed Employer dashboard and Conversion Tracking / Apply API events to see
      sponsored-job spend, clicks, applies, and hires per requisition.
  - name: Allocation
    description: Tag sponsored campaigns by department, requisition, and recruiter so spend can be charged
      back to the hiring team.
  - name: Optimization
    description: Tune daily budgets and bids based on cost-per-applicant and quality-of-applicant signal;
      pause low-performing campaigns automatically via the Sponsored Jobs API.
  - name: Accountability
    description: Designate a recruiting-marketing owner with monthly Indeed-spend budget; review cost-per-hire
      and cost-per-quality-applicant in monthly hiring reviews.
domains:
  - name: Understand Usage and Cost
    capabilities:
      - Data Ingestion
      - Allocation
      - Reporting and Analytics
      - Anomaly Management
  - name: Quantify Business Value
    capabilities:
      - Planning and Estimating
      - Forecasting
      - Budgeting
      - Benchmarking
      - Unit Economics
  - name: Optimize Usage and Cost
    capabilities:
      - Rate Optimization
      - Workload Optimization
  - name: Manage the FinOps Practice
    capabilities:
      - Invoicing and Chargeback
      - Onboarding Workloads
billingModel:
  pricingCategory: Auction-Priced Advertising
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Tax
    - Adjustment
    - Credit
  chargeFrequency: Recurring
focusColumns:
  ServiceName: Indeed Sponsored Jobs
  ServiceCategory: Recruiting + Job Advertising
  ProviderName: Indeed
  PublisherName: Indeed, Inc.
  InvoiceIssuerName: Indeed, Inc.
  PricingCategory: Pay-As-You-Go
  PricingUnit: click
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
  - name: sponsored_clicks
    description: Clicks on sponsored job postings (CPC model)
    unit: click
    aggregation: sum
    dimensions:
      - requisition
      - department
      - region
  - name: sponsored_applicants
    description: Applicants attributed to sponsored placement (PPA model)
    unit: applicant
    aggregation: sum
    dimensions:
      - requisition
      - department
      - region
  - name: campaign_budget
    description: Daily / monthly campaign budgets configured
    unit: USD-day
    aggregation: max
    dimensions:
      - campaign
      - department
apis:
  - name: Indeed Job Sync API
    baseURL: https://apis.indeed.com
    serviceCategory: API
  - name: Indeed Disposition Sync API
    baseURL: https://apis.indeed.com
    serviceCategory: API
  - name: Indeed Sponsored Jobs API
    baseURL: https://apis.indeed.com
    serviceCategory: API
  - name: Indeed Apply API
    baseURL: https://apis.indeed.com
    serviceCategory: API
  - name: Indeed Real-time API
    baseURL: https://apis.indeed.com
    serviceCategory: API
  - name: Indeed Employer API
    baseURL: https://apis.indeed.com
    serviceCategory: API
  - name: Indeed Conversion Tracking API
    baseURL: https://apis.indeed.com
    serviceCategory: API
unitEconomics:
  - name: Cost per Applicant
    metric: sponsored_spend / sponsored_applicants
    target: TBD
  - name: Cost per Hire
    metric: sponsored_spend / hires
    target: TBD
