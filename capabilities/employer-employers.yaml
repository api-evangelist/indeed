naftiko: 1.0.0-alpha2
info:
  label: Indeed Employer API — Employers
  description: 'Indeed Employer API — Employers. 4 operations. Lead operation: Indeed Create an Employer. Self-contained Naftiko
    capability covering one Indeed business surface.'
  tags:
  - Indeed
  - Employers
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    INDEED_API_KEY: INDEED_API_KEY
capability:
  consumes:
  - type: http
    namespace: employer-employers
    baseUri: https://apis.indeed.com
    description: Indeed Employer API — Employers business capability. Self-contained, no shared references.
    resources:
    - name: v1-employers
      path: /v1/employers
      operations:
      - name: createemployer
        method: POST
        description: Indeed Create an Employer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v1-employers-employerId
      path: /v1/employers/{employerId}
      operations:
      - name: getemployer
        method: GET
        description: Indeed Retrieve an Employer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: employerId
          in: path
          type: string
          description: The unique identifier of the employer.
          required: true
      - name: updateemployer
        method: PATCH
        description: Indeed Update an Employer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: employerId
          in: path
          type: string
          description: The unique identifier of the employer to update.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v1-employers-employerId-registration
      path: /v1/employers/{employerId}/registration
      operations:
      - name: registeremployerforcandidatesync
        method: PUT
        description: Indeed Register Employer for Candidate Sync
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: employerId
          in: path
          type: string
          description: The unique identifier of the employer to register.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.INDEED_API_KEY}}'
  exposes:
  - type: rest
    namespace: employer-employers-rest
    port: 8080
    description: REST adapter for Indeed Employer API — Employers. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v1/employers
      name: v1-employers
      description: REST surface for v1-employers.
      operations:
      - method: POST
        name: createemployer
        description: Indeed Create an Employer
        call: employer-employers.createemployer
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/employers/{employerid}
      name: v1-employers-employerid
      description: REST surface for v1-employers-employerId.
      operations:
      - method: GET
        name: getemployer
        description: Indeed Retrieve an Employer
        call: employer-employers.getemployer
        with:
          employerId: rest.employerId
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updateemployer
        description: Indeed Update an Employer
        call: employer-employers.updateemployer
        with:
          employerId: rest.employerId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/employers/{employerid}/registration
      name: v1-employers-employerid-registration
      description: REST surface for v1-employers-employerId-registration.
      operations:
      - method: PUT
        name: registeremployerforcandidatesync
        description: Indeed Register Employer for Candidate Sync
        call: employer-employers.registeremployerforcandidatesync
        with:
          employerId: rest.employerId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: employer-employers-mcp
    port: 9090
    transport: http
    description: MCP adapter for Indeed Employer API — Employers. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: indeed-create-employer
      description: Indeed Create an Employer
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: employer-employers.createemployer
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: indeed-retrieve-employer
      description: Indeed Retrieve an Employer
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: employer-employers.getemployer
      with:
        employerId: tools.employerId
      outputParameters:
      - type: object
        mapping: $.
    - name: indeed-update-employer
      description: Indeed Update an Employer
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: employer-employers.updateemployer
      with:
        employerId: tools.employerId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: indeed-register-employer-candidate-sync
      description: Indeed Register Employer for Candidate Sync
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: employer-employers.registeremployerforcandidatesync
      with:
        employerId: tools.employerId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
