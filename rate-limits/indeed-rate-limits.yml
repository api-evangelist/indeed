specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Indeed
providerId: indeed
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Careers
  - Employment
  - Hiring
  - Job Search
  - Recruiting
  - Rate Limiting
description: Indeed does not publish per-second / per-minute rate-limit numbers on its public partner
  documentation. Limits are negotiated as part of the Indeed Partner agreement and tuned per integration
  type (job sync, disposition sync, apply). Job feeds typically use scheduled XML ingestion rather than
  high-frequency request traffic.
notes: No public Indeed rate-limit numbers reachable. Partners should consult their Indeed account manager
  for tenant-specific TPS guidance.
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: Partner API throughput
    scope: partner
    metric: varies
    limit: governed by Indeed Partner agreement; typically scheduled feed ingestion rather than per-second
      TPS
    applies:
      - Indeed Job Sync API
      - Indeed Disposition Sync API
      - Indeed Sponsored Jobs API
      - Indeed Apply API
      - Indeed Real-time API
      - Indeed Employer API
policies:
  - name: Backoff Strategy
    description: Clients receiving 429 or 503 should implement exponential backoff with jitter and honor
      Retry-After when present.
  - name: Feed Ingestion
    description: Job feeds are typically ingested on a schedule (hourly / multi-hour) rather than per-job
      pushes; align update cadence to Indeed's documented partner ingestion intervals.
  - name: Fair Use
    description: Indeed reserves the right to throttle traffic that materially impacts shared infrastructure
      or violates the Indeed Partner agreement.
maintainers:
