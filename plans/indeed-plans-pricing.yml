specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Indeed
providerId: indeed
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Careers
  - Employment
  - Hiring
  - Job Search
  - Recruiting
description: Indeed's APIs are accessed via the Indeed Partner program (partners.indeed.com). They are
  not offered as a self-serve, pay-by-tier API product; partner approval is required and the underlying
  business is sponsored-job advertising (cost-per-click and pay-per-applicant), recruitment software
  subscriptions, and resume-search subscriptions. There is no published per-API price list. The Indeed
  Job Search Publisher API was retired in 2020.
notes: No public pricing for API access. Sponsored-jobs are billed via Indeed's advertising auction (CPC/PPA),
  not as API call fees. Reconcile against partner.indeed.com when partner-program documentation becomes
  publicly accessible.
sources:
  - https://partners.indeed.com/
  - https://www.indeed.com/hire/how-indeed-works
plans:
  - id: indeed-partner
    name: Indeed Partner Program
    type: enterprise
    description: Partner-only API access for ATS, job-board, and recruiting platforms. Requires Indeed
      Partner approval. APIs cover job ingestion, sponsored jobs, apply, disposition sync, and candidate
      retrieval. The partner does not pay per API call; the end-employer pays for sponsored placement.
    entries:
      - label: Partner program access
        description: API access bundled into the Indeed Partner agreement; not separately metered
        name: partner_access
        type: subscription
        metric: contract
        limit: -1
        timeFrame: year
        geo: global
        domains:
          - https://apis.indeed.com
        unit: 1
        price: contact partner team
        userMultiplied: false
    elements:
      - name: Indeed Job Sync API
      - name: Indeed Disposition Sync API
      - name: Indeed Sponsored Jobs API
      - name: Indeed Apply API
      - name: Indeed Real-time API
      - name: Indeed Employer API
      - name: Partner support channel
  - id: indeed-sponsored-jobs
    name: Sponsored Jobs (employer billing)
    type: usage-based
    description: End employers pay Indeed for sponsored job placement on a cost-per-click or pay-per-applicant
      basis through Indeed's advertising auction. Partners surface this via the Sponsored Jobs API but
      are not billed for it.
    entries:
      - label: Cost per click / pay per applicant
        description: Auction-priced advertising spend per click or per qualified applicant
        name: sponsored_spend
        type: metered
        metric: click_or_applicant
        limit: -1
        timeFrame: usage
        geo: global
        domains:
          - https://apis.indeed.com
        unit: 1
        price: auction-based; see https://www.indeed.com/hire/how-indeed-works
        userMultiplied: false
    elements:
      - name: Auction pricing
      - name: Daily budget controls
      - name: Performance-based bidding
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
